<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captain — WeAreGloria</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #050508;
    --teal-deep: #0a2e2e;
    --teal: #1a6b6b;
    --teal-bright: #2ec4b6;
    --teal-glow: #4dddd0;
    --sand: #c8a96e;
    --sand-light: #e8d4a8;
    --white: #f0ece4;
    --pixel: 2px;
  }

  html, body {
    min-height: 100vh;
    background: var(--black);
    color: var(--white);
    font-family: 'Crimson Text', Georgia, serif;
    overflow-x: hidden;
  }

  /* pixel noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* animated ocean waves at bottom */
  body::after {
    content: '';
    position: fixed;
    bottom: 0;
    left: -10%;
    width: 120%;
    height: 180px;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 6px,
      rgba(26, 107, 107, 0.12) 6px,
      rgba(26, 107, 107, 0.12) 8px
    ),
    linear-gradient(
      to top,
      rgba(10, 46, 46, 0.7) 0%,
      rgba(10, 46, 46, 0.3) 60%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 0;
    animation: wave 8s ease-in-out infinite alternate;
  }

  @keyframes wave {
    0% { transform: translateX(0) scaleY(1); }
    100% { transform: translateX(3%) scaleY(1.06); }
  }

  /* scanline effect for pixel feel */
  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* cover art */
  .cover-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 2rem;
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .cover-wrap::before {
    content: '';
    position: absolute;
    inset: -4px;
    border: 2px solid var(--teal-bright);
    image-rendering: pixelated;
    clip-path: polygon(
      0 8px, 8px 0,
      calc(100% - 8px) 0, 100% 8px,
      100% calc(100% - 8px), calc(100% - 8px) 100%,
      8px 100%, 0 calc(100% - 8px)
    );
    opacity: 0.7;
  }

  .cover-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: 0 0 40px rgba(46, 196, 182, 0.25), 0 0 80px rgba(46, 196, 182, 0.1);
    pointer-events: none;
  }

  .cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    image-rendering: pixelated;
    clip-path: polygon(
      0 8px, 8px 0,
      calc(100% - 8px) 0, 100% 8px,
      100% calc(100% - 8px), calc(100% - 8px) 100%,
      8px 100%, 0 calc(100% - 8px)
    );
  }

  /* title block */
  .title-block {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .track-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--sand-light);
    text-shadow: 0 0 20px rgba(200, 169, 110, 0.4);
    line-height: 1.2;
    margin-bottom: 0.8rem;
    animation: titleGlow 4s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    0% { text-shadow: 0 0 20px rgba(200, 169, 110, 0.3); }
    100% { text-shadow: 0 0 30px rgba(200, 169, 110, 0.6), 0 0 60px rgba(200, 169, 110, 0.2); }
  }

  .artist-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--teal-bright);
    opacity: 0.9;
  }

  /* divider */
  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
    opacity: 0.5;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
  }

  .divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--teal-bright);
    transform: rotate(45deg);
    flex-shrink: 0;
    image-rendering: pixelated;
  }

  /* links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    text-decoration: none;
    color: var(--white);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    font-weight: 400;
    border: 1px solid rgba(46, 196, 182, 0.2);
    background: rgba(10, 46, 46, 0.3);
    clip-path: polygon(
      0 4px, 4px 0,
      calc(100% - 4px) 0, 100% 4px,
      100% calc(100% - 4px), calc(100% - 4px) 100%,
      4px 100%, 0 calc(100% - 4px)
    );
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    animation: linkIn 0.5s ease both;
  }

  .link:nth-child(1) { animation-delay: 0.1s; }
  .link:nth-child(2) { animation-delay: 0.15s; }
  .link:nth-child(3) { animation-delay: 0.2s; }
  .link:nth-child(4) { animation-delay: 0.25s; }
  .link:nth-child(5) { animation-delay: 0.3s; }
  .link:nth-child(6) { animation-delay: 0.35s; }

  @keyframes linkIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .link::before {
    content: '';
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(46, 196, 182, 0.08), transparent);
    transition: left 0.4s ease;
  }

  .link:hover::before { left: 100%; }

  .link:hover {
    border-color: rgba(46, 196, 182, 0.6);
    background: rgba(10, 46, 46, 0.6);
    color: var(--teal-glow);
    transform: translateX(3px);
  }

  .link-arrow {
    font-size: 0.7rem;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.2s;
  }

  .link:hover .link-arrow {
    opacity: 1;
    transform: translateX(3px);
  }

  /* footer */
  .footer {
    margin-top: 3rem;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: rgba(240, 236, 228, 0.25);
    font-family: 'Cinzel', serif;
    text-align: center;
  }

  @media (max-width: 400px) {
    .track-title { font-size: 1.2rem; }
    .artist-name { font-size: 0.45rem; }
    .cover-wrap { width: 180px; height: 180px; }
    .container { padding: 2rem 1.2rem 4rem; }
    .link { font-size: 0.7rem; padding: 13px 16px; }
  }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="container">

  <div class="cover-wrap">
    <img class="cover" src="Captain.png" alt="Captain — WeAreGloria">
  </div>

  <div class="title-block">
    <div class="track-title">Captain</div>
    <div class="artist-name">WeAreGloria</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <div class="links">
    <a class="link" href="https://youtu.be/W9SCrbq-8jQ" target="_blank">
      YouTube <span class="link-arrow">→</span>
    </a>
    <a class="link" href="https://we-are-gloria.bandcamp.com/track/captain/" target="_blank">
      Bandcamp <span class="link-arrow">→</span>
    </a>
    <a class="link" href="https://soundcloud.com/we-are-gloria/captain" target="_blank">
      SoundCloud <span class="link-arrow">→</span>
    </a>
    <a class="link" href="https://tidal.com/album/TIDAL_ID/" target="_blank">
      Tidal <span class="link-arrow">→</span>
    </a>
    <a class="link" href="https://music.apple.com/album/captain/APPLE_ID" target="_blank">
      Apple Music <span class="link-arrow">→</span>
    </a>
  </div>

  <div class="footer">wearegloria &nbsp;·&nbsp; 2026</div>
</div>
</body>
</html>
